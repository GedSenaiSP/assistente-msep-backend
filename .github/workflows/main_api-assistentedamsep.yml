# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Python Container to Azure Web App - api-assistentedamsep

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permissão obrigatória para subir a imagem no GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        # Nomes de imagens Docker devem ser minúsculos
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Obrigatório para o Azure Login com OIDC
      contents: read
      
    steps:
      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: 'Configure Azure App Settings (Apenas Autenticação Docker)'
        uses: azure/appservice-settings@v1
        with:
          app-name: 'api-assistentedamsep'
          app-settings-json: |
            [
              { "name": "WEBSITES_PORT", "value": "8000", "slotSetting": false },
              { "name": "DOCKER_REGISTRY_SERVER_URL", "value": "https://ghcr.io", "slotSetting": false },
              { "name": "DOCKER_REGISTRY_SERVER_USERNAME", "value": "${{ github.actor }}", "slotSetting": false },
              { "name": "DOCKER_REGISTRY_SERVER_PASSWORD", "value": "${{ secrets.GHCR_PAT }}", "slotSetting": false }
            ]

      - name: 'Deploy Docker Container to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-assistentedamsep'
          slot-name: 'Production'
          images: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'